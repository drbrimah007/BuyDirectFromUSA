<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuyDirectFromUSA — Supplier Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="border-b border-slate-200 bg-white">
  <div class="flex items-center justify-between px-6 py-3">
    <div class="flex items-center gap-4">
      <a href="dashboard.html" class="text-lg font-bold"><span class="text-slate-950">Buy</span><span class="bg-gradient-to-r from-blue-700 to-red-700 bg-clip-text text-transparent">DirectFromUSA</span></a>
      <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-full font-medium">Supplier Management</span>
    </div>
    <div class="flex gap-3 text-sm">
      <a href="dashboard.html" class="text-slate-500 hover:text-slate-900">Dashboard</a>
      <a href="portal.html" class="text-slate-500 hover:text-slate-900">Client Portal</a>
    </div>
  </div>
</header>

<div id="login-gate" class="flex items-center justify-center min-h-[calc(100vh-52px)]">
  <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full mx-4">
    <h2 class="text-xl font-bold mb-4">Operator Login</h2>
    <div class="mb-3"><input type="email" id="s-email" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" placeholder="Email"></div>
    <div class="mb-3"><input type="password" id="s-pass" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" placeholder="Password"></div>
    <button onclick="sLogin()" class="w-full bg-sky-600 text-white py-2.5 rounded-xl font-semibold text-sm">Sign In</button>
    <p id="s-err" class="text-red-600 text-sm mt-2 hidden"></p>
  </div>
</div>

<div id="main" class="hidden max-w-6xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold">Suppliers</h2>
    <button onclick="openAddSupplier()" class="bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-sky-700">+ Add Supplier</button>
  </div>
  <div class="mb-4"><input type="search" id="sup-search" placeholder="Search suppliers..." oninput="filterSuppliers(this.value)" class="w-full max-w-md px-4 py-2.5 border border-slate-200 rounded-xl text-sm"></div>
  <div id="suppliers-list"><p class="text-slate-400 text-sm">Loading...</p></div>
</div>

<div id="modal-root"></div>

<script type="module">
import { supabase } from './js/supabase.js';
import { listSuppliers, createSupplier, updateSupplier, deleteSupplier, getSupplier } from './js/suppliers.js';

let user = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

window.sLogin = async function() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('s-email').value.trim(),
    password: document.getElementById('s-pass').value
  });
  if (error) { document.getElementById('s-err').textContent = error.message; document.getElementById('s-err').classList.remove('hidden'); return; }
  user = data.user; enter();
};

function enter() {
  document.getElementById('login-gate').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  loadSuppliers();
}

async function loadSuppliers() {
  const suppliers = await listSuppliers();
  const el = document.getElementById('suppliers-list');
  if (suppliers.length === 0) {
    el.innerHTML = '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center"><p class="text-slate-500">No suppliers yet.</p></div>';
    return;
  }
  el.innerHTML = `<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-slate-200 text-left">
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Company</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Contact</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Email</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">State</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Status</th>
        <th class="px-4 py-3"></th>
      </tr></thead>
      <tbody>
        ${suppliers.map(s => `<tr class="border-b border-slate-100 supplier-row hover:bg-slate-50" data-search="${esc(s.company_name + ' ' + s.contact_name + ' ' + s.email + ' ' + s.us_state).toLowerCase()}">
          <td class="px-4 py-3 font-semibold">${esc(s.company_name)} ${s.preferred ? '<span class="text-amber-500">⭐</span>' : ''} ${s.verified ? '<span class="text-green-600 text-xs">✓</span>' : ''}</td>
          <td class="px-4 py-3 text-slate-600">${esc(s.contact_name || '—')}</td>
          <td class="px-4 py-3 text-slate-500">${esc(s.email || '—')}</td>
          <td class="px-4 py-3 text-slate-500">${esc(s.us_state || '—')}</td>
          <td class="px-4 py-3"><span class="text-xs font-bold px-2 py-1 rounded-full ${s.verified ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${s.verified ? 'Verified' : 'Pending'}</span></td>
          <td class="px-4 py-3 text-right">
            <button onclick="toggleVerify('${s.id}',${!s.verified})" class="text-xs ${s.verified ? 'text-slate-500' : 'text-green-600 font-semibold'} mr-2">${s.verified ? 'Unverify' : 'Verify'}</button>
            <button onclick="togglePrefer('${s.id}',${!s.preferred})" class="text-xs ${s.preferred ? 'text-slate-500' : 'text-amber-600 font-semibold'} mr-2">${s.preferred ? 'Unstar' : '⭐ Star'}</button>
            <button onclick="confirmDel('${s.id}','${esc(s.company_name)}')" class="text-xs text-red-500">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

window.filterSuppliers = function(q) {
  document.querySelectorAll('.supplier-row').forEach(r => {
    r.style.display = r.dataset.search.includes(q.toLowerCase()) ? '' : 'none';
  });
};

window.toggleVerify = async function(id, val) {
  await updateSupplier(id, { verified: val });
  loadSuppliers();
};
window.togglePrefer = async function(id, val) {
  await updateSupplier(id, { preferred: val });
  loadSuppliers();
};
window.confirmDel = async function(id, name) {
  if (!confirm('Delete ' + name + '?')) return;
  await deleteSupplier(id);
  loadSuppliers();
};

window.openAddSupplier = function() {
  document.getElementById('modal-root').innerHTML = `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <h3 class="text-lg font-bold mb-4">Add Supplier</h3>
      <div class="space-y-3">
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Company Name *</label><input id="ns-company" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Contact Person</label><input id="ns-contact" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Email</label><input id="ns-email" type="email" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Phone</label><input id="ns-phone" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">U.S. State</label><input id="ns-state" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="CA, TX..."></div>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Website</label><input id="ns-web" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="https://"></div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">MOQ Range</label><input id="ns-moq" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="1 container, pallet+, etc."></div>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="ns-pl"> Private Label</label>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="ns-export" checked> Export Ready</label>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Notes</label><textarea id="ns-notes" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></textarea></div>
      </div>
      <div class="flex gap-2 mt-4 justify-end">
        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold">Cancel</button>
        <button onclick="doAddSupplier()" class="px-4 py-2 bg-sky-600 text-white rounded-xl text-sm font-semibold">Add Supplier</button>
      </div>
    </div>
  </div>`;
};

window.closeModal = function() { document.getElementById('modal-root').innerHTML = ''; };

window.doAddSupplier = async function() {
  const company = document.getElementById('ns-company').value.trim();
  if (!company) return alert('Company name required.');
  await createSupplier({
    companyName: company,
    contactName: document.getElementById('ns-contact').value.trim(),
    email: document.getElementById('ns-email').value.trim(),
    phone: document.getElementById('ns-phone').value.trim(),
    usState: document.getElementById('ns-state').value.trim(),
    website: document.getElementById('ns-web').value.trim(),
    moqRange: document.getElementById('ns-moq').value.trim(),
    privateLabel: document.getElementById('ns-pl').checked,
    notes: document.getElementById('ns-notes').value.trim()
  });
  closeModal();
  loadSuppliers();
};

// Auto-login
const { data: { session } } = await supabase.auth.getSession();
if (session?.user) { user = session.user; enter(); }
</script>
</body>
</html>
