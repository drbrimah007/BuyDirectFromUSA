<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuyDirectFromUSA — Supplier Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="border-b border-slate-200 bg-white">
  <div class="flex items-center justify-between px-6 py-3">
    <div class="flex items-center gap-4">
      <a href="dashboard.html" class="text-lg font-bold"><span class="text-slate-950">Buy</span><span class="bg-gradient-to-r from-blue-700 to-red-700 bg-clip-text text-transparent">DirectFromUSA</span></a>
      <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-full font-medium">Supplier Management</span>
    </div>
    <div class="flex gap-3 text-sm">
      <a href="dashboard.html" class="text-slate-500 hover:text-slate-900">Dashboard</a>
      <a href="portal.html" class="text-slate-500 hover:text-slate-900">Client Portal</a>
    </div>
  </div>
</header>

<div id="login-gate" class="flex items-center justify-center min-h-[calc(100vh-52px)]">
  <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full mx-4">
    <h2 class="text-xl font-bold mb-4">Operator Login</h2>
    <div class="mb-3"><input type="email" id="s-email" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" placeholder="Email"></div>
    <div class="mb-3"><input type="password" id="s-pass" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" placeholder="Password"></div>
    <button onclick="sLogin()" class="w-full bg-sky-600 text-white py-2.5 rounded-xl font-semibold text-sm">Sign In</button>
    <p id="s-err" class="text-red-600 text-sm mt-2 hidden"></p>
  </div>
</div>

<div id="main" class="hidden max-w-6xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold">Suppliers</h2>
    <button onclick="openAddSupplier()" class="bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-sky-700">+ Add Supplier</button>
  </div>
  <div class="mb-4"><input type="search" id="sup-search" placeholder="Search suppliers..." oninput="filterSuppliers(this.value)" class="w-full max-w-md px-4 py-2.5 border border-slate-200 rounded-xl text-sm"></div>
  <div id="suppliers-list"><p class="text-slate-400 text-sm">Loading...</p></div>
</div>

<div id="modal-root"></div>

<script type="module">
import { supabase } from './js/supabase.js';
import { listSuppliers, createSupplier, updateSupplier, deleteSupplier, getSupplier } from './js/suppliers.js';

let user = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

window.sLogin = async function() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('s-email').value.trim(),
    password: document.getElementById('s-pass').value
  });
  if (error) { document.getElementById('s-err').textContent = error.message; document.getElementById('s-err').classList.remove('hidden'); return; }
  user = data.user; enter();
};

function enter() {
  document.getElementById('login-gate').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  loadSuppliers();
}

async function loadSuppliers() {
  const suppliers = await listSuppliers();
  const el = document.getElementById('suppliers-list');
  if (suppliers.length === 0) {
    el.innerHTML = '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center"><p class="text-slate-500">No suppliers yet.</p></div>';
    return;
  }
  el.innerHTML = `<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead><tr class="border-b border-slate-200 text-left">
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Company</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Contact</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Email</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">State</th>
        <th class="px-4 py-3 font-semibold text-slate-500 text-xs uppercase">Status</th>
        <th class="px-4 py-3"></th>
      </tr></thead>
      <tbody>
        ${suppliers.map(s => `<tr class="border-b border-slate-100 supplier-row hover:bg-slate-50" data-search="${esc(s.company_name + ' ' + s.contact_name + ' ' + s.email + ' ' + s.us_state).toLowerCase()}">
          <td class="px-4 py-3 font-semibold"><a href="#" onclick="event.preventDefault();event.stopPropagation();openSupplierDetail('${s.id}')" class="text-sky-700 hover:underline">${esc(s.company_name)}</a> ${s.preferred ? '<span class="text-amber-500">⭐</span>' : ''} ${s.verified ? '<span class="text-green-600 text-xs">✓</span>' : ''}</td>
          <td class="px-4 py-3 text-slate-600">${esc(s.contact_name || '—')}</td>
          <td class="px-4 py-3 text-slate-500">${esc(s.email || '—')}</td>
          <td class="px-4 py-3 text-slate-500">${esc(s.us_state || '—')}</td>
          <td class="px-4 py-3"><span class="text-xs font-bold px-2 py-1 rounded-full ${s.verified ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${s.verified ? 'Verified' : 'Pending'}</span></td>
          <td class="px-4 py-3 text-right">
            <button onclick="toggleVerify('${s.id}',${!s.verified})" class="text-xs ${s.verified ? 'text-slate-500' : 'text-green-600 font-semibold'} mr-2">${s.verified ? 'Unverify' : 'Verify'}</button>
            <button onclick="togglePrefer('${s.id}',${!s.preferred})" class="text-xs ${s.preferred ? 'text-slate-500' : 'text-amber-600 font-semibold'} mr-2">${s.preferred ? 'Unstar' : '⭐ Star'}</button>
            <button onclick="openEditSupplier('${s.id}')" class="text-xs text-sky-600 font-semibold mr-2">Edit</button>
            <button onclick="confirmDel('${s.id}','${esc(s.company_name)}')" class="text-xs text-red-500">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

window.filterSuppliers = function(q) {
  document.querySelectorAll('.supplier-row').forEach(r => {
    r.style.display = r.dataset.search.includes(q.toLowerCase()) ? '' : 'none';
  });
};

window.toggleVerify = async function(id, val) {
  await updateSupplier(id, { verified: val });
  loadSuppliers();
};
window.togglePrefer = async function(id, val) {
  await updateSupplier(id, { preferred: val });
  loadSuppliers();
};
window.confirmDel = async function(id, name) {
  if (!confirm('Delete ' + name + '?')) return;
  await deleteSupplier(id);
  loadSuppliers();
};

window.openAddSupplier = function() {
  document.getElementById('modal-root').innerHTML = `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <h3 class="text-lg font-bold mb-4">Add Supplier</h3>
      <div class="space-y-3">
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Company Name *</label><input id="ns-company" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Contact Person</label><input id="ns-contact" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Email</label><input id="ns-email" type="email" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Phone</label><input id="ns-phone" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">U.S. State</label><input id="ns-state" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="CA, TX..."></div>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Website</label><input id="ns-web" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="https://"></div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">MOQ Range</label><input id="ns-moq" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm" placeholder="1 container, pallet+, etc."></div>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="ns-pl"> Private Label</label>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="ns-export" checked> Export Ready</label>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Notes</label><textarea id="ns-notes" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></textarea></div>
      </div>
      <div class="flex gap-2 mt-4 justify-end">
        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold">Cancel</button>
        <button onclick="doAddSupplier()" class="px-4 py-2 bg-sky-600 text-white rounded-xl text-sm font-semibold">Add Supplier</button>
      </div>
    </div>
  </div>`;
};

window.closeModal = function() { document.getElementById('modal-root').innerHTML = ''; };

window.doAddSupplier = async function() {
  const company = document.getElementById('ns-company').value.trim();
  if (!company) return alert('Company name required.');
  await createSupplier({
    companyName: company,
    contactName: document.getElementById('ns-contact').value.trim(),
    email: document.getElementById('ns-email').value.trim(),
    phone: document.getElementById('ns-phone').value.trim(),
    usState: document.getElementById('ns-state').value.trim(),
    website: document.getElementById('ns-web').value.trim(),
    moqRange: document.getElementById('ns-moq').value.trim(),
    privateLabel: document.getElementById('ns-pl').checked,
    exportReady: document.getElementById('ns-export').checked,
    notes: document.getElementById('ns-notes').value.trim()
  });
  closeModal();
  loadSuppliers();
};

window.openEditSupplier = async function(id) {
  const s = await getSupplier(id);
  if (!s) return alert('Supplier not found.');
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <h3 class="text-lg font-bold mb-4">Edit Supplier</h3>
      <div class="space-y-3">
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Company Name *</label><input id="es-company" value="${esc(s.company_name)}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Contact Name</label><input id="es-contact" value="${esc(s.contact_name||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Email</label><input id="es-email" value="${esc(s.email||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">Phone</label><input id="es-phone" value="${esc(s.phone||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
          <div><label class="block text-sm font-semibold text-slate-600 mb-1">U.S. State</label><input id="es-state" value="${esc(s.us_state||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Website</label><input id="es-web" value="${esc(s.website||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">MOQ Range</label><input id="es-moq" value="${esc(s.moq_range||'')}" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm"></div>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="es-pl" ${s.private_label?'checked':''}> Private Label</label>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="es-export" ${s.export_ready?'checked':''}> Export Ready</label>
        </div>
        <div><label class="block text-sm font-semibold text-slate-600 mb-1">Notes</label><textarea id="es-notes" rows="2" class="w-full border border-slate-200 rounded-xl px-4 py-2 text-sm">${esc(s.notes||'')}</textarea></div>
      </div>
      <div class="flex gap-2 mt-4 justify-end">
        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold">Cancel</button>
        <button onclick="doEditSupplier('${s.id}')" class="px-4 py-2 bg-sky-600 text-white rounded-xl text-sm font-semibold">Save Changes</button>
      </div>
    </div>
  </div>`;
};

window.doEditSupplier = async function(id) {
  const company = document.getElementById('es-company').value.trim();
  if (!company) return alert('Company name required.');
  await updateSupplier(id, {
    company_name: company,
    contact_name: document.getElementById('es-contact').value.trim(),
    email: document.getElementById('es-email').value.trim(),
    phone: document.getElementById('es-phone').value.trim(),
    us_state: document.getElementById('es-state').value.trim(),
    website: document.getElementById('es-web').value.trim(),
    moq_range: document.getElementById('es-moq').value.trim(),
    private_label: document.getElementById('es-pl').checked,
    export_ready: document.getElementById('es-export').checked,
    notes: document.getElementById('es-notes').value.trim()
  });
  closeModal();
  loadSuppliers();
};

// ── Supplier Detail Modal ──────────────────────────────────────────
function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

window.openSupplierDetail = async function(id) {
  const s = await getSupplier(id);
  if (!s) return alert('Supplier not found.');

  // Fetch deals matched to this supplier
  const { data: dealLinks } = await supabase.from('deal_suppliers')
    .select('*, deal:deals(id, product_needed, client_name, status)')
    .eq('supplier_id', id);
  const deals = (dealLinks || []).filter(dl => dl.deal);

  const products = s.products || [];
  const certs = (s.certifications || []);

  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-start justify-between mb-4">
        <div>
          <h3 class="text-xl font-bold">${escHtml(s.company_name)}</h3>
          <div class="flex items-center gap-2 mt-1">
            ${s.verified ? '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700">Verified</span>' : '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">Pending</span>'}
            ${s.preferred ? '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">Preferred</span>' : ''}
            ${s.export_ready ? '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">Export Ready</span>' : ''}
            ${s.private_label ? '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">Private Label</span>' : ''}
          </div>
        </div>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl font-bold leading-none">&times;</button>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-5">
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">Contact</p>
          <p class="font-semibold text-sm mt-1">${escHtml(s.contact_name || '—')}</p>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">Email</p>
          <p class="text-sm mt-1">${s.email ? `<a href="mailto:${escHtml(s.email)}" class="text-sky-700 hover:underline">${escHtml(s.email)}</a>` : '—'}</p>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">Phone</p>
          <p class="text-sm mt-1">${escHtml(s.phone || '—')}</p>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">U.S. State</p>
          <p class="text-sm mt-1">${escHtml(s.us_state || '—')}</p>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">Website</p>
          <p class="text-sm mt-1">${s.website ? `<a href="${escHtml(s.website)}" target="_blank" class="text-sky-700 hover:underline">${escHtml(s.website)}</a>` : '—'}</p>
        </div>
        <div class="bg-slate-50 rounded-xl p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase">MOQ Range</p>
          <p class="text-sm mt-1">${escHtml(s.moq_range || '—')}</p>
        </div>
      </div>

      ${certs.length > 0 ? `<div class="mb-5">
        <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Certifications</p>
        <div class="flex flex-wrap gap-1">${certs.map(c => `<span class="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full font-medium">${escHtml(c)}</span>`).join('')}</div>
      </div>` : ''}

      ${products.length > 0 ? `<div class="mb-5">
        <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Products (${products.length})</p>
        <div class="border border-slate-200 rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead><tr class="border-b border-slate-200 bg-slate-50 text-left">
              <th class="px-3 py-2 text-xs font-semibold text-slate-500">Product</th>
              <th class="px-3 py-2 text-xs font-semibold text-slate-500">SKU</th>
              <th class="px-3 py-2 text-xs font-semibold text-slate-500">Price</th>
              <th class="px-3 py-2 text-xs font-semibold text-slate-500">MOQ</th>
            </tr></thead>
            <tbody>${products.map(p => `<tr class="border-b border-slate-100">
              <td class="px-3 py-2">${escHtml(p.product_name || p.name || '—')}</td>
              <td class="px-3 py-2 text-slate-500">${escHtml(p.sku || '—')}</td>
              <td class="px-3 py-2 text-slate-500">${escHtml(p.price || p.unit_price || '—')}</td>
              <td class="px-3 py-2 text-slate-500">${escHtml(p.moq || '—')}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>` : ''}

      <div class="mb-4">
        <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Matched Deals (${deals.length})</p>
        ${deals.length > 0 ? deals.map(dl => {
          const d = dl.deal;
          return `<div class="border border-slate-200 rounded-xl p-3 mb-2 flex justify-between items-center">
            <div>
              <p class="font-semibold text-sm">${escHtml(d.product_needed || 'Untitled')}</p>
              <p class="text-xs text-slate-500">${escHtml(d.client_name || '—')}</p>
            </div>
            <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">${escHtml(d.status)}</span>
          </div>`;
        }).join('') : '<p class="text-sm text-slate-400">No deals matched to this supplier.</p>'}
      </div>

      ${s.notes ? `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
        <p class="text-xs font-semibold text-amber-700 uppercase mb-1">Notes</p>
        <p class="text-sm">${escHtml(s.notes)}</p>
      </div>` : ''}

      <div class="flex justify-end">
        <button onclick="closeModal()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold">Close</button>
      </div>
    </div>
  </div>`;
};

// Auto-login
const { data: { session } } = await supabase.auth.getSession();
if (session?.user) { user = session.user; enter(); }
</script>
</body>
</html>
