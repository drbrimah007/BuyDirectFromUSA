<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuyDirectFromUSA — Client Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="border-b border-slate-200 bg-white">
  <div class="flex items-center justify-between px-6 py-3 max-w-5xl mx-auto">
    <div class="text-lg font-bold"><span class="text-slate-950">Buy</span><span class="bg-gradient-to-r from-blue-700 to-red-700 bg-clip-text text-transparent">DirectFromUSA</span></div>
    <div class="flex items-center gap-3">
      <span id="portal-user" class="text-sm font-medium text-slate-600"></span>
      <button onclick="portalLogout()" class="text-sm text-slate-500 hover:text-slate-900">Sign Out</button>
    </div>
  </div>
</header>

<!-- Auth -->
<div id="portal-login" class="flex items-center justify-center min-h-[calc(100vh-52px)]">
  <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full mx-4">
    <h2 class="text-xl font-bold mb-1">Client Portal</h2>
    <p class="text-sm text-slate-500 mb-6">Track your sourcing requests and quotes</p>
    <div class="mb-3"><label class="block text-sm font-semibold text-slate-600 mb-1">Email</label><input type="email" id="p-email" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm"></div>
    <div class="mb-3"><label class="block text-sm font-semibold text-slate-600 mb-1">Password</label><input type="password" id="p-pass" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm"></div>
    <button onclick="portalLogin()" class="w-full bg-sky-600 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-sky-700 mb-3">Sign In</button>
    <button onclick="portalSignup()" class="w-full border border-slate-200 text-slate-700 py-2.5 rounded-xl font-semibold text-sm hover:bg-slate-50">Create Account</button>
    <p id="p-error" class="text-red-600 text-sm mt-3 hidden"></p>
  </div>
</div>

<!-- Portal Content -->
<div id="portal-content" class="hidden max-w-5xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold">My Sourcing Requests</h2>
    <a href="index.html" class="bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-sky-700">+ New Request</a>
  </div>
  <div id="requests-list"><p class="text-slate-400 text-sm">Loading...</p></div>
</div>

<script type="module">
import { supabase } from './js/supabase.js';
import { myRequests } from './js/requests.js';

const STATUSES = {
  new: { label: 'New', bg: '#ede9fe', color: '#6d28d9' },
  ai_reviewed: { label: 'Reviewing', bg: '#e0e7ff', color: '#4338ca' },
  in_progress: { label: 'In Progress', bg: '#dbeafe', color: '#1d4ed8' },
  awaiting_supplier: { label: 'Finding Suppliers', bg: '#fef3c7', color: '#92400e' },
  quote_ready: { label: 'Quote Ready', bg: '#d1fae5', color: '#065f46' },
  awaiting_client: { label: 'Awaiting Your Reply', bg: '#cffafe', color: '#0e7490' },
  negotiating: { label: 'Negotiating', bg: '#ffedd5', color: '#9a3412' },
  closed_won: { label: 'Completed', bg: '#d1fae5', color: '#065f46' },
  closed_lost: { label: 'Closed', bg: '#f1f5f9', color: '#64748b' }
};

let portalUser = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

window.portalLogin = async function() {
  const email = document.getElementById('p-email').value.trim();
  const pass = document.getElementById('p-pass').value;
  const err = document.getElementById('p-error');
  err.classList.add('hidden');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.classList.remove('hidden'); return; }
  enterPortal(data.user);
};

window.portalSignup = async function() {
  const email = document.getElementById('p-email').value.trim();
  const pass = document.getElementById('p-pass').value;
  const err = document.getElementById('p-error');
  err.classList.add('hidden');
  if (!email || !pass) { err.textContent = 'Email and password required'; err.classList.remove('hidden'); return; }
  const { data, error } = await supabase.auth.signUp({ email, password: pass, options: { data: { display_name: email.split('@')[0] } } });
  if (error) { err.textContent = error.message; err.classList.remove('hidden'); return; }
  if (data.user) enterPortal(data.user);
};

window.portalLogout = async function() {
  await supabase.auth.signOut();
  portalUser = null;
  document.getElementById('portal-content').classList.add('hidden');
  document.getElementById('portal-login').classList.remove('hidden');
};

async function enterPortal(user) {
  portalUser = user;
  document.getElementById('portal-user').textContent = user.email;
  document.getElementById('portal-login').classList.add('hidden');
  document.getElementById('portal-content').classList.remove('hidden');
  loadRequests();
}

async function loadRequests() {
  const el = document.getElementById('requests-list');
  const requests = await myRequests(portalUser.id);
  if (requests.length === 0) {
    el.innerHTML = `<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center">
      <p class="text-slate-500 mb-4">No requests yet. Submit your first sourcing request.</p>
      <a href="index.html" class="bg-sky-600 text-white px-6 py-2.5 rounded-xl font-semibold text-sm inline-block hover:bg-sky-700">Submit Request</a>
    </div>`;
    return;
  }
  el.innerHTML = requests.map(r => {
    const s = STATUSES[r.status] || STATUSES.new;
    return `<div class="bg-white rounded-2xl border border-slate-200 p-5 mb-3 hover:shadow-sm transition cursor-pointer" onclick="openRequestDetail('${r.id}')">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3 class="font-bold text-lg">${esc(r.product_needed)}</h3>
          <p class="text-sm text-slate-500 mt-1">${esc(r.request_type?.replace('_', ' ') || '')} ${r.target_country ? '· ' + esc(r.target_country) : ''} ${r.category?.name ? '· ' + esc(r.category.name) : ''}</p>
          <div class="flex gap-3 mt-2 text-xs text-slate-400">
            ${r.quantity ? `<span>Qty: ${esc(r.quantity)}</span>` : ''}
            ${r.packaging ? `<span>Pkg: ${esc(r.packaging)}</span>` : ''}
            <span>${new Date(r.created_at).toLocaleDateString()}</span>
          </div>
        </div>
        <span class="text-xs font-bold px-3 py-1 rounded-full flex-shrink-0" style="background:${s.bg};color:${s.color};">${s.label}</span>
      </div>
      ${r.special_notes ? `<div class="mt-3 bg-slate-50 rounded-xl p-3 text-sm text-slate-600">${esc(r.special_notes)}</div>` : ''}
    </div>`;
  }).join('');
}

window.openRequestDetail = async function(dealId) {
  const el = document.getElementById('requests-list');
  el.innerHTML = '<p class="text-slate-400 text-sm">Loading...</p>';

  // Load deal details and messages
  const { data: deal } = await supabase.from('deals').select('*').eq('id', dealId).single();
  if (!deal) { loadRequests(); return; }

  const { data: messages } = await supabase.from('deal_messages').select('*, sender:users(display_name)')
    .eq('deal_id', dealId).in('visible_to', ['all', 'client']).order('created_at', { ascending: true });

  const s = STATUSES[deal.status] || STATUSES.new;
  const msgs = messages || [];

  el.innerHTML = `
    <button onclick="loadRequests()" class="text-sm text-sky-600 font-semibold mb-4 inline-block">&larr; Back to all requests</button>
    <div class="bg-white rounded-2xl border border-slate-200 p-6 mb-4">
      <div class="flex items-start justify-between gap-4 mb-4">
        <div>
          <h3 class="font-bold text-xl">${esc(deal.product_needed)}</h3>
          <p class="text-sm text-slate-500 mt-1">${esc(deal.request_type?.replace('_', ' ') || '')} ${deal.target_country ? '· ' + esc(deal.target_country) : ''}</p>
        </div>
        <span class="text-xs font-bold px-3 py-1 rounded-full" style="background:${s.bg};color:${s.color};">${s.label}</span>
      </div>
      <div class="grid grid-cols-2 gap-4 text-sm mb-4">
        <div class="bg-slate-50 rounded-xl p-3"><p class="text-xs font-semibold text-slate-500 uppercase">Quantity</p><p class="mt-1 font-semibold">${esc(deal.quantity || '—')}</p></div>
        <div class="bg-slate-50 rounded-xl p-3"><p class="text-xs font-semibold text-slate-500 uppercase">Packaging</p><p class="mt-1 font-semibold">${esc(deal.packaging || '—')}</p></div>
        <div class="bg-slate-50 rounded-xl p-3"><p class="text-xs font-semibold text-slate-500 uppercase">Urgency</p><p class="mt-1 font-semibold">${esc(deal.urgency || 'normal')}</p></div>
        <div class="bg-slate-50 rounded-xl p-3"><p class="text-xs font-semibold text-slate-500 uppercase">Submitted</p><p class="mt-1 font-semibold">${new Date(deal.created_at).toLocaleDateString()}</p></div>
      </div>
      ${deal.special_notes ? `<div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-600 mb-4"><p class="text-xs font-semibold text-slate-500 uppercase mb-1">Notes</p>${esc(deal.special_notes)}</div>` : ''}
      ${deal.ai_summary ? `<div class="bg-sky-50 border border-sky-200 rounded-xl p-3 text-sm"><p class="text-xs font-semibold text-sky-700 uppercase mb-1">Sourcing Summary</p>${esc(deal.ai_summary)}</div>` : ''}
    </div>

    <div id="portal-timeline" class="mb-4"><p class="text-slate-400 text-xs">Loading timeline...</p></div>

    <div class="bg-white rounded-2xl border border-slate-200 p-6">
      <h4 class="font-bold text-lg mb-4">Messages</h4>
      <div id="portal-msgs" class="space-y-3 mb-4 max-h-96 overflow-y-auto">
        ${msgs.length === 0 ? '<p class="text-slate-400 text-sm">No messages yet. Our team will reach out when we have updates.</p>' :
          msgs.map(m => `<div class="rounded-xl p-3 ${m.sender_id === portalUser.id ? 'bg-sky-50 border border-sky-200 ml-8' : 'bg-slate-50 border border-slate-200 mr-8'}">
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs font-semibold ${m.sender_id === portalUser.id ? 'text-sky-700' : 'text-slate-600'}">${m.sender_id === portalUser.id ? 'You' : esc(m.sender?.display_name || 'Sourcing Team')}</span>
              <span class="text-xs text-slate-400">${new Date(m.created_at).toLocaleString()}</span>
            </div>
            <p class="text-sm">${esc(m.body)}</p>
          </div>`).join('')}
      </div>
      <div class="flex gap-2">
        <input type="text" id="portal-msg-input" placeholder="Type a message..." class="flex-1 border border-slate-200 rounded-xl px-4 py-2 text-sm" onkeydown="if(event.key==='Enter')sendPortalMsg('${dealId}')">
        <button onclick="sendPortalMsg('${dealId}')" class="bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-semibold">Send</button>
      </div>
    </div>`;
  // Scroll to latest message
  const msgsEl = document.getElementById('portal-msgs');
  if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;

  // Load status timeline
  loadPortalTimeline(dealId);
};

window.sendPortalMsg = async function(dealId) {
  const input = document.getElementById('portal-msg-input');
  const body = input?.value.trim();
  if (!body || !portalUser) return;
  input.value = '';
  await supabase.from('deal_messages').insert({
    deal_id: dealId, sender_id: portalUser.id, body, visible_to: 'all'
  });
  openRequestDetail(dealId);
};

// ── Status Timeline ───────────────────────────────────────────────
async function loadPortalTimeline(dealId) {
  const { data: history } = await supabase
    .from('deal_status_history')
    .select('*')
    .eq('deal_id', dealId)
    .order('created_at', { ascending: true });
  const el = document.getElementById('portal-timeline');
  if (!el) return;
  const items = history || [];
  if (items.length === 0) {
    el.innerHTML = `<div class="bg-white rounded-2xl border border-slate-200 p-6">
      <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Request Progress</p>
      <p class="text-sm text-slate-400">No status updates yet. Our team is reviewing your request.</p>
    </div>`;
    return;
  }
  const statusColors = {
    new: '#6366f1', ai_reviewed: '#8b5cf6', in_progress: '#3b82f6',
    awaiting_supplier: '#f59e0b', quote_ready: '#10b981', awaiting_client: '#06b6d4',
    negotiating: '#f97316', closed_won: '#16a34a', closed_lost: '#ef4444', archived: '#94a3b8'
  };
  el.innerHTML = `<div class="bg-white rounded-2xl border border-slate-200 p-6">
    <p class="text-xs font-semibold text-slate-500 uppercase mb-3">Request Progress</p>
    <div class="relative pl-6">
      <div class="absolute left-[9px] top-1 bottom-1 w-0.5 bg-slate-200"></div>
      ${items.map(h => {
        const sOld = STATUSES[h.old_status] || { label: h.old_status || 'Start' };
        const sNew = STATUSES[h.new_status] || { label: h.new_status };
        const color = statusColors[h.new_status] || '#94a3b8';
        const dt = new Date(h.created_at);
        const dateStr = dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="relative mb-4 last:mb-0">
          <div class="absolute -left-6 top-0.5 w-[14px] h-[14px] rounded-full border-2 border-white" style="background:${color};box-shadow:0 0 0 2px ${color}33;"></div>
          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs font-bold" style="color:${color};">${esc(sNew.label)}</span>
              <span class="text-[10px] text-slate-400">${dateStr}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// Auto-login
const { data: { session } } = await supabase.auth.getSession();
if (session?.user) enterPortal(session.user);
</script>
</body>
</html>
